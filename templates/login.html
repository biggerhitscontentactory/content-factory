<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Factory — Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #0f172a; color: #e2e8f0; min-height: 100vh;
         display: flex; align-items: center; justify-content: center; }
  .login-card { background: #1e293b; border: 1px solid #334155; border-radius: 16px;
                padding: 40px; width: 100%; max-width: 400px; }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo h1 { font-size: 24px; font-weight: 800; color: #f8fafc; }
  .logo p { font-size: 13px; color: #64748b; margin-top: 4px; }
  .flag { font-size: 32px; display: block; margin-bottom: 12px; }
  label { display: block; font-size: 13px; font-weight: 600; color: #94a3b8;
          margin-bottom: 6px; }
  input[type="password"] { width: 100%; padding: 12px 16px; background: #0f172a;
    border: 1px solid #334155; border-radius: 8px; color: #f8fafc; font-size: 15px;
    outline: none; transition: border-color 0.2s; }
  input[type="password"]:focus { border-color: #0ea5e9; }
  .btn { width: 100%; padding: 12px; background: #0ea5e9; color: white;
         border: none; border-radius: 8px; font-size: 15px; font-weight: 700;
         cursor: pointer; margin-top: 16px; transition: background 0.2s; }
  .btn:hover { background: #0284c7; }
  .error { background: #450a0a; border: 1px solid #7f1d1d; color: #fca5a5;
           padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <span class="flag">🏭</span>
    <h1>Content Factory</h1>
    <p>🇺🇸 Official USA Store &amp; AI Channel</p>
  </div>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" placeholder="Enter your password" autofocus>
    <button type="submit" class="btn">Sign In →</button>
  </form>
</div>
</body>
</html>
